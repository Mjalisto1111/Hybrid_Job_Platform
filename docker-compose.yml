version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: skillconnect
      POSTGRES_PASSWORD: skillconnect
      POSTGRES_DB: skillconnect
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend:/app
    ports:
      - '5000:5000'
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env.example
    volumes:
      - ./frontend:/app
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  db-data:
